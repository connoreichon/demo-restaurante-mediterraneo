<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-g2" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#3a2418"/>
      <stop offset="1" stop-color="#1a1c22"/>
    </linearGradient>
    <radialGradient id="vig-g2" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="blur-g2"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="grain-g2">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1400" height="1000" fill="url(#base-g2)"/>
  <circle cx="1120" cy="700" r="600" fill="#e8915a" opacity="0.5" filter="url(#blur-g2)"/>
  <circle cx="700" cy="300" r="400" fill="#d98a86" opacity="0.3" filter="url(#blur-g2)"/>
  <rect width="1400" height="1000" fill="url(#vig-g2)"/>
  <rect width="1400" height="1000" filter="url(#grain-g2)" opacity="0.6"/>
</svg>