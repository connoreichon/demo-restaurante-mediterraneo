<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-g4" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#3a2e1f"/>
      <stop offset="1" stop-color="#1c140c"/>
    </linearGradient>
    <radialGradient id="vig-g4" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="blur-g4"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="grain-g4">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1000" height="1000" fill="url(#base-g4)"/>
  <circle cx="500" cy="450" r="550" fill="#e7cf9c" opacity="0.45" filter="url(#blur-g4)"/>
  <circle cx="250" cy="750" r="300" fill="#bd7a3a" opacity="0.25" filter="url(#blur-g4)"/>
  <rect width="1000" height="1000" fill="url(#vig-g4)"/>
  <rect width="1000" height="1000" filter="url(#grain-g4)" opacity="0.6"/>
</svg>