<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-g5" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#2a1414"/>
      <stop offset="1" stop-color="#100707"/>
    </linearGradient>
    <radialGradient id="vig-g5" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="blur-g5"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="grain-g5">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1400" height="1000" fill="url(#base-g5)"/>
  <circle cx="979.9999999999999" cy="400" r="500" fill="#9c2b22" opacity="0.45" filter="url(#blur-g5)"/>
  <circle cx="420" cy="600" r="350" fill="#d9a14e" opacity="0.3" filter="url(#blur-g5)"/>
  <rect width="1400" height="1000" fill="url(#vig-g5)"/>
  <rect width="1400" height="1000" filter="url(#grain-g5)" opacity="0.6"/>
</svg>