<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="grad-hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15140F"/>
      <stop offset="1" stop-color="#2A2118"/>
    </linearGradient>
    <radialGradient id="glow-hero" cx="0.7" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#C1440E" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#C1440E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C1440E" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-hero"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="noise-hero">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#grad-hero)"/>
  <circle cx="1248" cy="280" r="320" fill="#C1440E" opacity="0.5" filter="url(#soft-hero)"/>
  <circle cx="320" cy="820" r="280" fill="#6B7340" opacity="0.28" filter="url(#soft-hero)"/>
  <circle cx="800" cy="500" r="220" fill="#C9A86A" opacity="0.18" filter="url(#soft-hero)"/>
  <rect width="1600" height="1000" fill="url(#glow-hero)"/>
  <rect width="1600" height="1000" filter="url(#noise-hero)" opacity="0.7"/>
  <rect x="64" y="40" width="1472" height="920" fill="none" stroke="#F5EFE6" stroke-opacity="0.18" stroke-width="2"/>
  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="800" y="423" font-family="Arial, Helvetica, sans-serif" font-size="32" letter-spacing="8" fill="#F5EFE6" fill-opacity="0.7">FRENTE AL MAR · DESDE 1998</text>
    <text x="800" y="538.5" font-size="110" font-style="italic" fill="#F5EFE6">Sal Marina</text>
  </g>
</svg>