<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-hero" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#241b12"/>
      <stop offset="1" stop-color="#0e0b08"/>
    </linearGradient>
    <radialGradient id="vig-hero" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="blur-hero"><feGaussianBlur stdDeviation="108"/></filter>
    <filter id="grain-hero">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1800" height="1200" fill="url(#base-hero)"/>
  <circle cx="1404" cy="264" r="660" fill="#e08a3c" opacity="0.5" filter="url(#blur-hero)"/>
  <circle cx="1620" cy="480" r="420" fill="#c2a35f" opacity="0.35" filter="url(#blur-hero)"/>
  <circle cx="360" cy="1020" r="600" fill="#3a4a2e" opacity="0.3" filter="url(#blur-hero)"/>
  <circle cx="810" cy="720" r="360" fill="#bd4422" opacity="0.18" filter="url(#blur-hero)"/>
  <rect width="1800" height="1200" fill="url(#vig-hero)"/>
  <rect width="1800" height="1200" filter="url(#grain-hero)" opacity="0.6"/>
</svg>