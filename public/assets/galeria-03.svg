<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-g3" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#23271a"/>
      <stop offset="1" stop-color="#0e110a"/>
    </linearGradient>
    <radialGradient id="vig-g3" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="blur-g3"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="grain-g3">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1000" height="1000" fill="url(#base-g3)"/>
  <circle cx="400" cy="400" r="500" fill="#6f7d3e" opacity="0.45" filter="url(#blur-g3)"/>
  <circle cx="700" cy="700" r="300" fill="#c2a35f" opacity="0.3" filter="url(#blur-g3)"/>
  <rect width="1000" height="1000" fill="url(#vig-g3)"/>
  <rect width="1000" height="1000" filter="url(#grain-g3)" opacity="0.6"/>
</svg>