<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1400" viewBox="0 0 1000 1400" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-g6" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1f1109"/>
      <stop offset="1" stop-color="#0a0604"/>
    </linearGradient>
    <radialGradient id="vig-g6" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="blur-g6"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="grain-g6">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1000" height="1400" fill="url(#base-g6)"/>
  <circle cx="500" cy="979.9999999999999" r="550" fill="#d4521b" opacity="0.55" filter="url(#blur-g6)"/>
  <circle cx="600" cy="560" r="300" fill="#f0a23a" opacity="0.35" filter="url(#blur-g6)"/>
  <rect width="1000" height="1400" fill="url(#vig-g6)"/>
  <rect width="1000" height="1400" filter="url(#grain-g6)" opacity="0.6"/>
</svg>