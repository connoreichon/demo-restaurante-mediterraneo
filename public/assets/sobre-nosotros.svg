<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-brasa" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1a0f09"/>
      <stop offset="1" stop-color="#070504"/>
    </linearGradient>
    <radialGradient id="vig-brasa" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.62"/>
    </radialGradient>
    <filter id="blur-brasa"><feGaussianBlur stdDeviation="108"/></filter>
