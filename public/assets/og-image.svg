<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Terraza frente al mar al atardecer">
  <defs>
    <linearGradient id="sky-og" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14100c"/>
      <stop offset="0.42" stop-color="#3a2316"/>
      <stop offset="0.72" stop-color="#b9542a"/>
      <stop offset="0.92" stop-color="#e89a4e"/>
      <stop offset="1" stop-color="#f3c074"/>
    </linearGradient>
    <linearGradient id="sea-og" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d98a48"/>
      <stop offset="0.12" stop-color="#9a5a38"/>
      <stop offset="0.55" stop-color="#36251f"/>
      <stop offset="1" stop-color="#0e0a08"/>
    </linearGradient>
    <radialGradient id="sun-og" cx="0.66" cy="1" r="0.62">
      <stop offset="0" stop-color="#ffe7b0" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#ffb060" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffb060" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vgn-og" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0705" stop-opacity="0.35"/>
      <stop offset="0.4" stop-color="#0a0705" stop-opacity="0"/>
      <stop offset="1" stop-color="#0a0705" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="soft-og"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="grain-og">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="315" fill="url(#sky-og)"/>
  <ellipse cx="792" cy="315" rx="600" ry="214" fill="url(#sun-og)"/>
  <circle cx="792" cy="299" r="44" fill="#ffdf95" opacity="0.92" filter="url(#soft-og)"/>
  <rect y="315" width="1200" height="315" fill="url(#sea-og)"/>
  <rect x="696" y="315" width="192" height="315" fill="#ffcf8a" opacity="0.15" filter="url(#soft-og)"/>
  <rect x="0" y="334" width="1200" height="3" fill="#ffe6c0" opacity="0.130"/><rect x="0" y="356" width="1200" height="3" fill="#ffe6c0" opacity="0.119"/><rect x="0" y="384" width="1200" height="3" fill="#ffe6c0" opacity="0.105"/><rect x="0" y="419" width="1200" height="3" fill="#ffe6c0" opacity="0.087"/><rect x="0" y="460" width="1200" height="3" fill="#ffe6c0" opacity="0.066"/><rect x="0" y="510" width="1200" height="3" fill="#ffe6c0" opacity="0.041"/>
  <rect width="1200" height="630" fill="url(#vgn-og)"/>
  <rect width="1200" height="630" filter="url(#grain-og)" opacity="0.5"/>
</svg>