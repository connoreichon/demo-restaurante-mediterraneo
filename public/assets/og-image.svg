<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-og" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#241b12"/>
      <stop offset="1" stop-color="#0e0b08"/>
    </linearGradient>
    <radialGradient id="vig-og" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="blur-og"><feGaussianBlur stdDeviation="57"/></filter>
    <filter id="grain-og">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#base-og)"/>
  <circle cx="900" cy="157.5" r="378" fill="#e08a3c" opacity="0.5" filter="url(#blur-og)"/>
  <circle cx="300" cy="504" r="315" fill="#3a4a2e" opacity="0.3" filter="url(#blur-og)"/>
  <rect width="1200" height="630" fill="url(#vig-og)"/>
  <rect width="1200" height="630" filter="url(#grain-og)" opacity="0.6"/>
</svg>