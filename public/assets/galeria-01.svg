<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1400" viewBox="0 0 1000 1400" role="img" aria-label="Sal Marina">
  <defs>
    <linearGradient id="base-g1" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#2a2017"/>
      <stop offset="1" stop-color="#0f0a07"/>
    </linearGradient>
    <radialGradient id="vig-g1" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="blur-g1"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="grain-g1">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1000" height="1400" fill="url(#base-g1)"/>
  <circle cx="700" cy="420" r="500" fill="#d99a4e" opacity="0.4" filter="url(#blur-g1)"/>
  <circle cx="300" cy="979.9999999999999" r="350" fill="#bd4422" opacity="0.2" filter="url(#blur-g1)"/>
  <rect width="1000" height="1400" fill="url(#vig-g1)"/>
  <rect width="1000" height="1400" filter="url(#grain-g1)" opacity="0.6"/>
</svg>